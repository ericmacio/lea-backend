# ============================================
# Prod profile - MySQL (Railway)
# ============================================
# Values are injected via Railway environment variables referencing the MySQL service:
#   SPRING_DATASOURCE_URL=jdbc:mysql://${{MySQL.MYSQLHOST}}:${{MySQL.MYSQLPORT}}/${{MySQL.MYSQLDATABASE}}?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
#   SPRING_DATASOURCE_USERNAME=${{MySQL.MYSQLUSER}}
#   SPRING_DATASOURCE_PASSWORD=${{MySQL.MYSQLPASSWORD}}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate - MySQL
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# First deploy: set to 'update' so Hibernate creates the schema, then switch to 'validate'.
# Preferred path: introduce Flyway and keep this on 'validate' from day one (see docs/DB.md §7).
spring.jpa.hibernate.ddl-auto=validate

# ============================================
# Connection pool (HikariCP)
# ============================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
