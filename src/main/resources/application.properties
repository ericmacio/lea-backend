# ============================================
# Application
# ============================================
spring.application.name=chat
# Default profile (overridden on Railway via SPRING_PROFILES_ACTIVE=prod)
spring.profiles.active=dev

# ============================================
# Server
# ============================================
server.port=8080

# ============================================
# Spring AI - OpenAI
# ============================================
spring.ai.model.chat=openai
spring.ai.model.embedding=openai
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=500

# ============================================
# AWS - Region
# ============================================
spring.cloud.aws.region.static=eu-west-3

# ============================================
# Chat -Business rules
# ============================================
chat.rate-limit.requests-per-hour=20
chat.rate-limit.requests-per-minute=5
chat.rate-limit.global.requests-per-hour=50
chat.rate-limit.global.requests-per-minute=10
chat.session.messages-per-session=20
chat.session.session-per-ip=2
chat.session.ttl-minute=3
chat.allowed-origin=https://lea-backend-production-cf36.up.railway.app
chat.allowed-origin-phase1=*

# ============================================
# AWS S3 - Buckets
# ============================================
rag.s3.bucket=lea-chat-rag
system-prompt.s3.bucket=lea-chat-prompt

# ============================================
# API Key - Header
# ============================================
chat.api-key-header=X-Chat-Api-Key
#chat.api-key-param=lea-chat-api-key
api.secret.key=${API_SECRET_KEY}

# ============================================
# Datasource / JPA
# ============================================
# Profile-specific: see application-dev.properties (H2) and application-prod.properties (MySQL)
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# Logging
# ============================================
logging.level.emk.ai.chat=INFO
logging.level.org.springframework.ai=DEBUG

